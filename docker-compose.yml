version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentpass}
      POSTGRES_DB: ${POSTGRES_DB:-agents}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentuser} -d ${POSTGRES_DB:-agents}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentuser:agentpass@postgres:5432/agents}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - workspace:/shared/workspace
      - ./agents.yaml:/app/agents.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}

  orchestrator:
    build:
      context: ./agents/base
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID: orchestrator
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentuser:agentpass@postgres:5432/agents}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - workspace:/shared/workspace
      - ./agents/orchestrator/prompt.md:/app/prompt.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro

  coder:
    build:
      context: ./agents/base
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID: coder
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentuser:agentpass@postgres:5432/agents}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - workspace:/shared/workspace
      - ./agents/coder/prompt.md:/app/prompt.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro

  reviewer:
    build:
      context: ./agents/base
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID: reviewer
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentuser:agentpass@postgres:5432/agents}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - workspace:/shared/workspace
      - ./agents/reviewer/prompt.md:/app/prompt.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro

  tester:
    build:
      context: ./agents/base
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      AGENT_ID: tester
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DATABASE_URL: ${DATABASE_URL:-postgresql://agentuser:agentpass@postgres:5432/agents}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - workspace:/shared/workspace
      - ./agents/tester/prompt.md:/app/prompt.md:ro
      - ./AGENTS.md:/app/AGENTS.md:ro

volumes:
  workspace:
  pgdata:
  redis_data:
