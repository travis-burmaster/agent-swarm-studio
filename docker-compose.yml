version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Agent Swarm Studio — Business Intelligence Swarm
# 4 Specialist Agents: Lawyer · Data Researcher · Marketing · Sales
# ─────────────────────────────────────────────────────────────────────────────

x-agent-common: &agent-common
  build:
    context: ./agents/base
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
  environment:
    REDIS_URL: redis://redis:6379
    DATABASE_URL: postgresql://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpass}@postgres:5432/${POSTGRES_DB:-agents}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
    CLAUDE_PROXY_URL: http://claude-proxy:8319
    TARGET_COMPANY_URL: ${TARGET_COMPANY_URL:-}
    AGENT_SEARCH_CONFIG: /app/agent-search-config
  volumes:
    - ./agents/base/agent_runner.py:/app/agent_runner.py:ro
    - ./agents/base/requirements.txt:/app/requirements.txt:ro
    # Shared identity files — all agents mount the same docs
    - ./SOUL.md:/app/shared/SOUL.md:ro
    - ./RULES.md:/app/shared/RULES.md:ro
    - ./AGENTS.md:/app/shared/AGENTS.md:ro
    - ./INSTRUCTIONS.md:/app/shared/INSTRUCTIONS.md:ro
    # Shared workspace for inter-agent file exchange
    - workspace:/shared/workspace
    # agent-search-tool config (if pre-configured)
    - agent-search-config:/app/agent-search-config

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentpass}
      POSTGRES_DB: ${POSTGRES_DB:-agents}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentuser} -d ${POSTGRES_DB:-agents}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend API ─────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpass}@postgres:5432/${POSTGRES_DB:-agents}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
      CLAUDE_PROXY_URL: http://claude-proxy:8319
      AGENTS_CONFIG: /app/agent.yaml
      TARGET_COMPANY_URL: ${TARGET_COMPANY_URL:-}
      PROJECT_ROOT: /app
    volumes:
      - ./agent.yaml:/app/agent.yaml
      - ./agents:/app/agents
      - ./.agents:/app/.agents
      - workspace:/shared/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Claude OAuth Proxy (optional — used when ANTHROPIC_OAUTH_KEY is set) ────

  claude-proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8319:8319"
    environment:
      ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
      PROXY_PORT: "8319"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8319/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Frontend UI ─────────────────────────────────────────────────────────────

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000

  # ── Specialist Agents ───────────────────────────────────────────────────────

  lawyer:
    <<: *agent-common
    container_name: agent-lawyer
    environment:
      AGENT_ID: lawyer
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpass}@postgres:5432/${POSTGRES_DB:-agents}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
      CLAUDE_PROXY_URL: http://claude-proxy:8319
      TARGET_COMPANY_URL: ${TARGET_COMPANY_URL:-}
      AGENT_SEARCH_CONFIG: /app/agent-search-config
    volumes:
      - ./agents/base/agent_runner.py:/app/agent_runner.py:ro
      - ./agents/base/requirements.txt:/app/requirements.txt:ro
      - ./agents/lawyer/prompt.md:/app/prompt.md:ro
      - ./agents/lawyer/SOUL.md:/app/SOUL.md:ro
      - ./agents/lawyer/RULES.md:/app/RULES.md:ro
      - ./.agents/skills/lawyer:/app/skills:ro
      - ./SOUL.md:/app/shared/SOUL.md:ro
      - ./RULES.md:/app/shared/RULES.md:ro
      - ./AGENTS.md:/app/shared/AGENTS.md:ro
      - ./INSTRUCTIONS.md:/app/shared/INSTRUCTIONS.md:ro
      - workspace:/shared/workspace
      - agent-search-config:/app/agent-search-config

  data-researcher:
    <<: *agent-common
    container_name: agent-data-researcher
    environment:
      AGENT_ID: data-researcher
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpass}@postgres:5432/${POSTGRES_DB:-agents}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
      CLAUDE_PROXY_URL: http://claude-proxy:8319
      TARGET_COMPANY_URL: ${TARGET_COMPANY_URL:-}
      AGENT_SEARCH_CONFIG: /app/agent-search-config
    volumes:
      - ./agents/base/agent_runner.py:/app/agent_runner.py:ro
      - ./agents/base/requirements.txt:/app/requirements.txt:ro
      - ./agents/data-researcher/prompt.md:/app/prompt.md:ro
      - ./agents/data-researcher/SOUL.md:/app/SOUL.md:ro
      - ./agents/data-researcher/RULES.md:/app/RULES.md:ro
      - ./.agents/skills/data-researcher:/app/skills:ro
      - ./SOUL.md:/app/shared/SOUL.md:ro
      - ./RULES.md:/app/shared/RULES.md:ro
      - ./AGENTS.md:/app/shared/AGENTS.md:ro
      - ./INSTRUCTIONS.md:/app/shared/INSTRUCTIONS.md:ro
      - workspace:/shared/workspace
      - agent-search-config:/app/agent-search-config

  marketing:
    <<: *agent-common
    container_name: agent-marketing
    environment:
      AGENT_ID: marketing
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpass}@postgres:5432/${POSTGRES_DB:-agents}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
      CLAUDE_PROXY_URL: http://claude-proxy:8319
      TARGET_COMPANY_URL: ${TARGET_COMPANY_URL:-}
      AGENT_SEARCH_CONFIG: /app/agent-search-config
    volumes:
      - ./agents/base/agent_runner.py:/app/agent_runner.py:ro
      - ./agents/base/requirements.txt:/app/requirements.txt:ro
      - ./agents/marketing/prompt.md:/app/prompt.md:ro
      - ./agents/marketing/SOUL.md:/app/SOUL.md:ro
      - ./agents/marketing/RULES.md:/app/RULES.md:ro
      - ./.agents/skills/marketing:/app/skills:ro
      - ./SOUL.md:/app/shared/SOUL.md:ro
      - ./RULES.md:/app/shared/RULES.md:ro
      - ./AGENTS.md:/app/shared/AGENTS.md:ro
      - ./INSTRUCTIONS.md:/app/shared/INSTRUCTIONS.md:ro
      - workspace:/shared/workspace
      - agent-search-config:/app/agent-search-config

  sales:
    <<: *agent-common
    container_name: agent-sales
    environment:
      AGENT_ID: sales
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-agentuser}:${POSTGRES_PASSWORD:-agentpass}@postgres:5432/${POSTGRES_DB:-agents}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_OAUTH_KEY: ${ANTHROPIC_OAUTH_KEY:-}
      CLAUDE_PROXY_URL: http://claude-proxy:8319
      TARGET_COMPANY_URL: ${TARGET_COMPANY_URL:-}
      AGENT_SEARCH_CONFIG: /app/agent-search-config
    volumes:
      - ./agents/base/agent_runner.py:/app/agent_runner.py:ro
      - ./agents/base/requirements.txt:/app/requirements.txt:ro
      - ./agents/sales/prompt.md:/app/prompt.md:ro
      - ./agents/sales/SOUL.md:/app/SOUL.md:ro
      - ./agents/sales/RULES.md:/app/RULES.md:ro
      - ./.agents/skills/sales:/app/skills:ro
      - ./SOUL.md:/app/shared/SOUL.md:ro
      - ./RULES.md:/app/shared/RULES.md:ro
      - ./AGENTS.md:/app/shared/AGENTS.md:ro
      - ./INSTRUCTIONS.md:/app/shared/INSTRUCTIONS.md:ro
      - workspace:/shared/workspace
      - agent-search-config:/app/agent-search-config

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  redis-data:
  pg-data:
  workspace:
  agent-search-config:
